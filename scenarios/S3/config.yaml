scenario_id: S3
name: "Order Failure & Automated Recovery"
description: >
  Identical supply chain disruption to S1. The mock supplier API
  fails on the first order attempt. System retries successfully.
  Tests FR-4.3 (retry) and the recovery path.
sources:
  - file: khan_warehouse_oct.csv
    kind: csv
    credibility_prior: 0.80
  - file: sales_dashboard_lahore.json
    kind: json
    credibility_prior: 0.95
  - file: supplier_email_karachi_cool.txt
    kind: email
    credibility_prior: 0.85
  - file: complaints_log_oct.json
    kind: json
    credibility_prior: 0.75
  - file: news_fuel_prices.html
    kind: news_html
    credibility_prior: 0.65
constraints:
  budget_pkr: 3500000
  lead_time_days: 5
  urgency: critical
thresholds:
  stockout_risk_pct: 55
  revenue_at_risk_pkr: 1500000
