    credibility_prior: 0.85
    recency_days: 1
  - file: sales_dashboard_s2.json
    kind: json
    credibility_prior: 0.80
    recency_days: 2
  - file: supplier_email_s2.txt
    kind: email
    credibility_prior: 0.65
    recency_days: 2
